<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Let Me ChatGPT That For You</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E&%23129302;%3C/text%3E%3C/svg%3E">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0a0f;
      color: #ececf4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      line-height: 1.5;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    main { max-width: 44ch; }
    .code {
      font-size: clamp(3.4rem, 14vw, 5.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0;
      background: linear-gradient(95deg, #c4b5fd, #a78bfa 45%, #7c8cf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: #a78bfa;
    }
    p { margin: 14px 0 26px; color: #9a9ab2; font-size: 1.02rem; }
    a {
      display: inline-block;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      background: linear-gradient(120deg, #7c3aed, #8b5cf6 55%, #6d6df0);
      border-radius: 12px;
      padding: 13px 26px;
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.35);
    }
    a:hover { filter: brightness(1.08); }
    a:focus-visible { outline: 2px solid #a78bfa; outline-offset: 2px; }
  </style>
</head>
<body>
  <main>
    <h1 class="code">404</h1>
    <p>This page asked us where it was. We told it to ask an AI.</p>
    <a href="/">Go ask one yourself &rarr;</a>
  </main>
</body>
</html>
